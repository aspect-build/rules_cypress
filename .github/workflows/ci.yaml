name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    id-token: write

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    semantic-pull-request:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
              env:
                GITHUB_TOKEN: ${{ github.token }}
    buildifier:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Buildifier
              run: aspect buildifier --task-key=buildifier
    test:
        name: test (${{ matrix.workspace.path }}, ${{ matrix.bazel.id }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                workspace:
                - { path: ".", slug: "root" }
                - { path: "e2e/workspace", slug: "e2e-workspace" }
                bazel:
                - { id: "bazel-7", version: "7.x", flags: "--bazel-flag=--test_tag_filters=-skip-on-bazel7" }
                - { id: "bazel-8", version: "8.x", flags: "--bazel-flag=--test_tag_filters=-skip-on-bazel8" }
                - { id: "bazel-9", version: "9.x", flags: "--bazel-flag=--test_tag_filters=-skip-on-bazel9" }
        env:
            USE_BAZEL_VERSION: ${{ matrix.bazel.version }}
        steps:
            - uses: actions/checkout@v6
            - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Test
              working-directory: ${{ matrix.workspace.path }}
              run: aspect test --task-key=test-${{ matrix.workspace.slug }}-${{ matrix.bazel.id }} ${{ matrix.bazel.flags }} -- //...
    # macOS smoke - only e2e/workspace on the primary Bazel version.
    # Only run on main (not PRs) to minimize minutes (macOS is billed at 10X).
    # https://docs.github.com/en/billing/managing-billing-for-github-actions/about-billing-for-github-actions#included-storage-and-minutes
    # NB: Windows is not covered — there is no Cypress toolchain registered for it
    # (//cypress:toolchain_type has no matching toolchains on Windows).
    smoke:
        name: smoke (macos, e2e/workspace)
        if: github.ref_name == 'main' || contains(github.head_ref, 'macos')
        runs-on: macos-latest
        env:
            USE_BAZEL_VERSION: "7.x"
        steps:
            - uses: actions/checkout@v6
            - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Test
              working-directory: e2e/workspace
              run: aspect test --task-key=smoke-e2e-workspace --bazel-flag=--test_tag_filters=-skip-on-bazel7 -- //...
    # Provides a stable job name for branch protection rules, gating on the test
    # and smoke jobs above.
    conclusion:
        needs: [test, smoke]
        runs-on: ubuntu-latest
        if: always()
        steps:
            - run: |
                if [[ "${{ needs.test.result }}" == "success" && ( "${{ needs.smoke.result }}" == "success" || "${{ needs.smoke.result }}" == "skipped" ) ]]; then
                  exit 0
                else
                  exit 1
                fi
