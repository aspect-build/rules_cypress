# See CONTRIBUTING.md for instructions.
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# Commitizen runs in commit-msg stage
# but we don't want to run the other hooks on commit messages
default_stages: [commit]

repos:
  # Check formatting and lint for starlark code
  - repo: https://github.com/keith/pre-commit-buildifier
    rev: 8.5.1.1
    hooks:
      - id: buildifier
      - id: buildifier-lint
  # Enforce that commit messages allow for later changelog generation
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.4
    hooks:
      # Requires that commitizen is already installed
      - id: commitizen
        stages: [commit-msg]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        # Pin prettier to match the version in package.json / //tools/format.
        # (mirrors-prettier is archived; the bundled v3.1.0 is the last stable tag.)
        additional_dependencies: ["prettier@3.8.4"]
  - repo: local
    hooks:
      - id: aspect_rules_lint
        name: Format
        language: system
        entry: bazel run //:format
        files: .*
